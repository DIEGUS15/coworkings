spring:
  application:
    name: coworkings

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/coworkings}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:Y293b3JraW5nc0FwcEBTZWNyZXRLZXkyMDI2IWNvd29ya2luZ3M=}
      expiration: ${JWT_EXPIRATION:21600000}